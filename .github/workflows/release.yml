name: Release Build

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry Run (uncheck to create a release)'
        required: false
        default: true
        type: boolean
      release_production:
        description: 'Release to latest (production) channel. For stable production releases only!'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact_name: git-ai-linux-x64
            use_docker: true
            docker_image: ubuntu:22.04
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: git-ai-linux-arm64
            use_docker: true
            docker_image: ubuntu:22.04
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: git-ai-windows-x64
            use_docker: false
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: git-ai-windows-arm64
            use_docker: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: git-ai-macos-arm64
            use_docker: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from Cargo.toml
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build in Docker (Linux)
        if: matrix.use_docker == true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            -e SENTRY_OSS="${{ secrets.SENTRY_OSS }}" \
            -e POSTHOG_API_KEY="${{ secrets.POSTHOG_API_KEY }}" \
            -e OSS_BUILD="1" \
            ${{ matrix.docker_image }} \
            bash -c "
              apt-get update && \
              apt-get install -y curl build-essential pkg-config musl-tools && \
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target ${{ matrix.target }} && \
              . \$HOME/.cargo/env && \
              cargo build --release --target ${{ matrix.target }} && \
              strip target/${{ matrix.target }}/release/git-ai
            "

      - name: Install Rust toolchain (non-Docker)
        if: matrix.use_docker == false
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache dependencies (non-Docker)
        if: matrix.use_docker == false
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binary (non-Docker, non-Windows-ARM64)
        if: matrix.use_docker == false && matrix.os != 'windows-11-arm'
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: 0
          SENTRY_OSS: ${{ secrets.SENTRY_OSS }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          OSS_BUILD: "1"

      - name: Build release binary (Windows ARM64 with LLVM strip)
        if: matrix.os == 'windows-11-arm'
        run: |
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_INCREMENTAL: 0
          SENTRY_OSS: ${{ secrets.SENTRY_OSS }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          OSS_BUILD: "1"
          RUSTFLAGS: "-C strip=symbols"

      - name: Verify binary architecture (Linux)
        if: contains(matrix.os, 'ubuntu')
        run: |
          file target/${{ matrix.target }}/release/git-ai
          # Verify the binary is statically linked (musl)
          if ldd target/${{ matrix.target }}/release/git-ai 2>&1 | grep -q 'not a dynamic executable\|statically linked'; then
            echo "Binary is statically linked (musl) - no GLIBC dependency"
          else
            echo "::error::Binary is dynamically linked - expected static musl binary"
            ldd target/${{ matrix.target }}/release/git-ai || true
            exit 1
          fi

      - name: Verify binary architecture (Windows)
        if: contains(matrix.os, 'windows')
        shell: bash
        run: |
          file target/${{ matrix.target }}/release/git-ai.exe

      - name: Strip binary (Windows x64)
        if: matrix.os == 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/git-ai.exe

      - name: Strip binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          strip target/${{ matrix.target }}/release/git-ai

      - name: Create release directory
        run: |
          mkdir -p release

      - name: Copy binary to release directory
        if: contains(matrix.os, 'windows')
        run: |
          cp target/${{ matrix.target }}/release/git-ai.exe release/${{ matrix.artifact_name }}.exe

      - name: Copy binary to release directory (non-Windows)
        if: ${{ !contains(matrix.os, 'windows') }}
        run: |
          cp target/${{ matrix.target }}/release/git-ai release/${{ matrix.artifact_name }}

      - name: Upload artifact (Windows)
        if: contains(matrix.os, 'windows')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}.exe
          retention-days: 30

      - name: Upload artifact (non-Windows)
        if: ${{ !contains(matrix.os, 'windows') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}
          retention-days: 30

  build-macos-intel:
    name: Build for macOS Intel
    runs-on: macos-15-intel
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from Cargo.toml
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - name: Cache dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-x86_64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-apple-darwin-

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-apple-darwin
        env:
          CARGO_INCREMENTAL: 0
          SENTRY_OSS: ${{ secrets.SENTRY_OSS }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          OSS_BUILD: "1"

      - name: Verify binary architecture
        run: |
          file target/x86_64-apple-darwin/release/git-ai
          lipo -info target/x86_64-apple-darwin/release/git-ai

      - name: Strip binary
        run: |
          strip target/x86_64-apple-darwin/release/git-ai

      - name: Create release directory
        run: |
          mkdir -p release

      - name: Copy binary to release directory
        run: |
          cp target/x86_64-apple-darwin/release/git-ai release/git-ai-macos-x64

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-macos-x64
          path: release/git-ai-macos-x64
          retention-days: 30

  build-msi:
    name: Build Windows MSI Installers
    needs: [build]
    runs-on: windows-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Windows x64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-windows-x64
          path: artifacts

      - name: Download Windows ARM64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-windows-arm64
          path: artifacts

      - name: Build MSI for x64
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}".TrimStart('v')
          .\installer\windows\build-msi.ps1 `
            -BinaryPath "artifacts\git-ai-windows-x64.exe" `
            -Architecture x64 `
            -Version $version `
            -OutputPath "release\git-ai-windows-x64.msi"

      - name: Build MSI for ARM64
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}".TrimStart('v')
          .\installer\windows\build-msi.ps1 `
            -BinaryPath "artifacts\git-ai-windows-arm64.exe" `
            -Architecture arm64 `
            -Version $version `
            -OutputPath "release\git-ai-windows-arm64.msi"

      - name: Upload MSI x64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-windows-x64-msi
          path: release/git-ai-windows-x64.msi
          retention-days: 30

      - name: Upload MSI ARM64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-windows-arm64-msi
          path: release/git-ai-windows-arm64.msi
          retention-days: 30

  build-pkg:
    name: Build macOS Package Installers
    needs: [build, build-macos-intel]
    runs-on: macos-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download macOS ARM64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-macos-arm64
          path: artifacts

      - name: Download macOS x64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-macos-x64
          path: artifacts

      - name: Build pkg for ARM64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          chmod +x artifacts/git-ai-macos-arm64
          ./installer/macos/build-pkg.sh \
            --binary artifacts/git-ai-macos-arm64 \
            --arch arm64 \
            --version "$VERSION" \
            --output release/git-ai-macos-arm64.pkg

      - name: Build pkg for x64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          chmod +x artifacts/git-ai-macos-x64
          ./installer/macos/build-pkg.sh \
            --binary artifacts/git-ai-macos-x64 \
            --arch x64 \
            --version "$VERSION" \
            --output release/git-ai-macos-x64.pkg

      - name: Upload pkg ARM64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-macos-arm64-pkg
          path: release/git-ai-macos-arm64.pkg
          retention-days: 30

      - name: Upload pkg x64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-macos-x64-pkg
          path: release/git-ai-macos-x64.pkg
          retention-days: 30

  build-linux-packages:
    name: Build Linux Packages (deb/rpm)
    needs: [build]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download Linux x64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-linux-x64
          path: artifacts

      - name: Download Linux ARM64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-linux-arm64
          path: artifacts

      - name: Build deb for amd64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          chmod +x artifacts/git-ai-linux-x64
          ./installer/linux/build-deb.sh \
            --binary artifacts/git-ai-linux-x64 \
            --arch amd64 \
            --version "$VERSION" \
            --output "release/git-ai_${VERSION}_amd64.deb"

      - name: Build deb for arm64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          chmod +x artifacts/git-ai-linux-arm64
          ./installer/linux/build-deb.sh \
            --binary artifacts/git-ai-linux-arm64 \
            --arch arm64 \
            --version "$VERSION" \
            --output "release/git-ai_${VERSION}_arm64.deb"

      - name: Build rpm for x86_64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          ./installer/linux/build-rpm.sh \
            --binary artifacts/git-ai-linux-x64 \
            --arch x86_64 \
            --version "$VERSION" \
            --output "release/git-ai-${VERSION}-1.x86_64.rpm"

      - name: Build rpm for aarch64
        run: |
          VERSION=$(echo "${{ needs.build.outputs.version }}" | sed 's/^v//')
          ./installer/linux/build-rpm.sh \
            --binary artifacts/git-ai-linux-arm64 \
            --arch aarch64 \
            --version "$VERSION" \
            --output "release/git-ai-${VERSION}-1.aarch64.rpm"

      - name: Upload deb amd64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-linux-amd64-deb
          path: release/*.deb
          retention-days: 30

      - name: Upload deb arm64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-linux-arm64-deb
          path: release/*arm64.deb
          retention-days: 30

      - name: Upload rpm x86_64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-linux-x86_64-rpm
          path: release/*.x86_64.rpm
          retention-days: 30

      - name: Upload rpm aarch64
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-ai-linux-aarch64-rpm
          path: release/*.aarch64.rpm
          retention-days: 30

  test-msi:
    name: Test Windows MSI Installer
    needs: [build, build-msi]
    runs-on: windows-latest
    if: success()

    steps:
      - name: Download MSI x64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-windows-x64-msi
          path: installer

      - name: Install MSI silently
        shell: pwsh
        run: |
          $msi = (Get-ChildItem installer\*.msi).FullName
          Write-Host "Installing: $msi"
          $proc = Start-Process msiexec -ArgumentList "/i `"$msi`" /qn /norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "MSI install failed with exit code $($proc.ExitCode)"
            exit 1
          }

      - name: Verify files installed
        shell: pwsh
        run: |
          $installDir = "C:\Program Files\git-ai\bin"
          if (-not (Test-Path "$installDir\git-ai.exe")) {
            Write-Error "git-ai.exe not found at $installDir"
            exit 1
          }
          if (-not (Test-Path "$installDir\git.exe")) {
            Write-Error "git.exe shim not found at $installDir"
            exit 1
          }
          Write-Host "Files verified at $installDir"
          Get-ChildItem $installDir

      - name: Verify PATH contains git-ai
        shell: pwsh
        run: |
          $systemPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($systemPath -notlike "*git-ai*") {
            Write-Error "System PATH does not contain git-ai: $systemPath"
            exit 1
          }
          Write-Host "PATH verified: contains git-ai bin directory"

      - name: Verify binary executes
        shell: pwsh
        run: |
          $env:Path = "C:\Program Files\git-ai\bin;" + $env:Path
          $output = & "C:\Program Files\git-ai\bin\git-ai.exe" --version 2>&1
          Write-Host "git-ai --version: $output"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "git-ai --version exited with code $LASTEXITCODE"
            exit 1
          }

      - name: Uninstall MSI silently
        shell: pwsh
        run: |
          $msi = (Get-ChildItem installer\*.msi).FullName
          $proc = Start-Process msiexec -ArgumentList "/x `"$msi`" /qn /norestart" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "MSI uninstall failed with exit code $($proc.ExitCode)"
            exit 1
          }

      - name: Verify clean uninstall
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\git-ai\bin\git-ai.exe") {
            Write-Error "git-ai.exe still exists after uninstall"
            exit 1
          }
          $systemPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($systemPath -like "*git-ai*") {
            Write-Error "System PATH still contains git-ai after uninstall"
            exit 1
          }
          Write-Host "Clean uninstall verified"

  test-pkg:
    name: Test macOS pkg Installer
    needs: [build, build-macos-intel, build-pkg]
    runs-on: macos-latest
    if: success()

    steps:
      - name: Download pkg ARM64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-macos-arm64-pkg
          path: installer

      - name: Install pkg
        run: |
          PKG=$(ls installer/*.pkg | head -1)
          echo "Installing: $PKG"
          sudo installer -pkg "$PKG" -target /

      - name: Verify files installed
        run: |
          INSTALL_DIR="/Library/git-ai/bin"
          if [ ! -x "$INSTALL_DIR/git-ai" ]; then
            echo "ERROR: git-ai not found at $INSTALL_DIR"
            exit 1
          fi
          if [ ! -x "$INSTALL_DIR/git" ]; then
            echo "ERROR: git shim not found at $INSTALL_DIR"
            exit 1
          fi
          echo "Files verified:"
          ls -la "$INSTALL_DIR"

      - name: Verify PATH mechanism
        run: |
          if ! grep -q "/Library/git-ai/bin" /etc/paths; then
            echo "ERROR: /etc/paths does not contain /Library/git-ai/bin"
            cat /etc/paths
            exit 1
          fi
          echo "/etc/paths verified:"
          cat /etc/paths

      - name: Verify binary executes
        run: |
          OUTPUT=$(/Library/git-ai/bin/git-ai --version 2>&1) || true
          echo "git-ai --version: $OUTPUT"
          # Verify it at least runs (exit code may vary without config)
          /Library/git-ai/bin/git-ai --version

      - name: Uninstall
        run: |
          sudo rm -rf /Library/git-ai
          sudo sed -i '' '\|/Library/git-ai/bin|d' /etc/paths

      - name: Verify clean uninstall
        run: |
          if [ -d "/Library/git-ai" ]; then
            echo "ERROR: /Library/git-ai still exists after uninstall"
            exit 1
          fi
          if grep -q "/Library/git-ai/bin" /etc/paths; then
            echo "ERROR: /etc/paths still contains git-ai entry"
            exit 1
          fi
          echo "Clean uninstall verified"

  test-deb:
    name: Test Linux deb Installer
    needs: [build, build-linux-packages]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download deb amd64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-linux-amd64-deb
          path: installer

      - name: Install deb
        run: |
          DEB=$(ls installer/*amd64.deb | head -1)
          echo "Installing: $DEB"
          sudo dpkg -i "$DEB"

      - name: Verify files installed
        run: |
          INSTALL_DIR="/usr/lib/git-ai/bin"
          if [ ! -x "$INSTALL_DIR/git-ai" ]; then
            echo "ERROR: git-ai not found at $INSTALL_DIR"
            exit 1
          fi
          if [ ! -x "$INSTALL_DIR/git" ]; then
            echo "ERROR: git shim not found at $INSTALL_DIR"
            exit 1
          fi
          echo "Files verified:"
          ls -la "$INSTALL_DIR"

      - name: Verify PATH mechanism
        run: |
          if [ ! -f "/etc/profile.d/git-ai.sh" ]; then
            echo "ERROR: /etc/profile.d/git-ai.sh not found"
            exit 1
          fi
          if ! grep -q "/usr/lib/git-ai/bin" /etc/profile.d/git-ai.sh; then
            echo "ERROR: profile.d script does not contain correct path"
            cat /etc/profile.d/git-ai.sh
            exit 1
          fi
          echo "PATH mechanism verified:"
          cat /etc/profile.d/git-ai.sh

      - name: Verify binary executes
        run: |
          export PATH="/usr/lib/git-ai/bin:$PATH"
          OUTPUT=$(/usr/lib/git-ai/bin/git-ai --version 2>&1) || true
          echo "git-ai --version: $OUTPUT"
          /usr/lib/git-ai/bin/git-ai --version

      - name: Verify package metadata
        run: |
          dpkg -s git-ai
          echo "---"
          dpkg -L git-ai

      - name: Uninstall deb
        run: |
          sudo dpkg -r git-ai

      - name: Verify clean uninstall
        run: |
          if [ -f "/usr/lib/git-ai/bin/git-ai" ]; then
            echo "ERROR: git-ai binary still exists after uninstall"
            exit 1
          fi
          if [ -f "/etc/profile.d/git-ai.sh" ]; then
            echo "ERROR: profile.d script still exists after uninstall"
            exit 1
          fi
          echo "Clean uninstall verified"

  test-rpm:
    name: Test Linux rpm Installer
    needs: [build, build-linux-packages]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download rpm x86_64
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: git-ai-linux-x86_64-rpm
          path: installer

      - name: Test rpm install in Fedora container
        run: |
          RPM=$(ls installer/*.x86_64.rpm | head -1)
          echo "Testing: $RPM"
          docker run --rm -v "$(pwd)/installer:/installer" fedora:latest bash -c '
            set -euo pipefail

            echo "=== Installing rpm ==="
            rpm -i /installer/*.x86_64.rpm

            echo "=== Verifying files ==="
            INSTALL_DIR="/usr/lib/git-ai/bin"
            test -x "$INSTALL_DIR/git-ai" || { echo "ERROR: git-ai not found"; exit 1; }
            test -x "$INSTALL_DIR/git" || { echo "ERROR: git shim not found"; exit 1; }
            ls -la "$INSTALL_DIR"

            echo "=== Verifying PATH mechanism ==="
            test -f /etc/profile.d/git-ai.sh || { echo "ERROR: profile.d script not found"; exit 1; }
            grep -q "/usr/lib/git-ai/bin" /etc/profile.d/git-ai.sh || { echo "ERROR: path not in script"; exit 1; }
            cat /etc/profile.d/git-ai.sh

            echo "=== Verifying binary executes ==="
            /usr/lib/git-ai/bin/git-ai --version || true

            echo "=== Verifying package metadata ==="
            rpm -qi git-ai
            rpm -ql git-ai

            echo "=== Uninstalling rpm ==="
            rpm -e git-ai

            echo "=== Verifying clean uninstall ==="
            test ! -f "$INSTALL_DIR/git-ai" || { echo "ERROR: binary still exists"; exit 1; }
            test ! -f /etc/profile.d/git-ai.sh || { echo "ERROR: profile.d still exists"; exit 1; }
            echo "Clean uninstall verified"
          '

  create-release:
    name: Create Release
    needs: [build, build-macos-intel, build-msi, build-pkg, build-linux-packages, test-msi, test-pkg, test-deb, test-rpm]
    runs-on: ubuntu-latest
    if: success() && inputs.dry_run != true

    steps:
      - name: Determine release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION="${{ needs.build.outputs.version }}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [[ "${{ inputs.release_production }}" == 'true' ]]; then
            RELEASE_TAG="$BASE_VERSION"
            CHANNEL="latest"
            PRERELEASE="false"
            MAKE_LATEST="true"
          else
            RELEASE_TAG="${BASE_VERSION}-next-${SHORT_SHA}"
            CHANNEL="next"
            PRERELEASE="true"
            MAKE_LATEST="false"
          fi

          echo "tag_name=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=Release $RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_latest=$MAKE_LATEST" >> "$GITHUB_OUTPUT"
          echo "channel_label=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create release directory
        run: mkdir -p release

      - name: Move artifacts to release directory
        run: |
          find artifacts -name "git-ai-*" -exec cp {} release/ \;

      - name: List available artifacts
        run: |
          echo "Available artifacts:"
          ls -la release/ || echo "No artifacts found"

      - name: Create checksums
        run: |
          cd release
          if ls git-ai-* git-ai_* 1> /dev/null 2>&1; then
            sha256sum git-ai-* git-ai_* 2>/dev/null | sort > SHA256SUMS
          else
            echo "No binaries found to create checksums for"
            touch SHA256SUMS
          fi

      - name: Checkout code for install script
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: repo

      - name: Generate version-pinned install script
        run: |
          VERSION="${{ steps.release-meta.outputs.tag_name }}"
          REPO="${{ github.repository }}"
          # Convert checksums to pipe-separated format for embedding
          CHECKSUMS=$(tr '\n' '|' < release/SHA256SUMS | sed 's/|$//')
          if [ -z "$CHECKSUMS" ]; then
            CHECKSUMS="__CHECKSUMS_PLACEHOLDER__"
          fi
          # Replace placeholder values with release-specific values (pattern-based to be resilient to line changes)
          awk -v repo="$REPO" -v version="$VERSION" -v checksums="$CHECKSUMS" '
            /^REPO="__REPO_PLACEHOLDER__"/ { sub(/__REPO_PLACEHOLDER__/, repo) }
            /^PINNED_VERSION="__VERSION_PLACEHOLDER__"/ { sub(/__VERSION_PLACEHOLDER__/, version) }
            /^EMBEDDED_CHECKSUMS="__CHECKSUMS_PLACEHOLDER__"/ { sub(/__CHECKSUMS_PLACEHOLDER__/, checksums) }
            { print }
          ' repo/install.sh > release/install.sh
          chmod +x release/install.sh
          echo "Generated version-pinned install.sh for $VERSION from $REPO"
          echo "Embedded checksums: $CHECKSUMS"

      - name: Generate version-pinned install.ps1 script
        run: |
          VERSION="${{ steps.release-meta.outputs.tag_name }}"
          REPO="${{ github.repository }}"
          # Reuse checksums from earlier step
          CHECKSUMS=$(tr '\n' '|' < release/SHA256SUMS | sed 's/|$//')
          if [ -z "$CHECKSUMS" ]; then
            CHECKSUMS="__CHECKSUMS_PLACEHOLDER__"
          fi
          # Replace placeholder values with release-specific values (pattern-based to be resilient to line changes)
          awk -v repo="$REPO" -v version="$VERSION" -v checksums="$CHECKSUMS" '
            /^[$]Repo = .__REPO_PLACEHOLDER__/ { sub(/__REPO_PLACEHOLDER__/, repo) }
            /^[$]PinnedVersion = .__VERSION_PLACEHOLDER__/ { sub(/__VERSION_PLACEHOLDER__/, version) }
            /^[$]EmbeddedChecksums = .__CHECKSUMS_PLACEHOLDER__/ { sub(/__CHECKSUMS_PLACEHOLDER__/, checksums) }
            { print }
          ' repo/install.ps1 > release/install.ps1
          echo "Generated version-pinned install.ps1 for $VERSION from $REPO"

      - name: Add install scripts to SHA256SUMS
        run: |
          cd release
          sha256sum install.sh install.ps1 >> SHA256SUMS

      - name: Generate attestations for release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/git-ai-*
            release/git-ai_*
            release/install.sh
            release/install.ps1
            release/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          name: ${{ steps.release-meta.outputs.release_name }}
          generate_release_notes: true
          body: |
            ## git-ai ${{ steps.release-meta.outputs.tag_name }}

            ### Release Channel
            `${{ steps.release-meta.outputs.channel_label }}`

            ${{ steps.release-meta.outputs.prerelease != 'true' && '---' || '' }}

            ${{ steps.release-meta.outputs.prerelease != 'true' && '> **Detailed AI-generated changelog is being generated and will appear here shortly...**' || '' }}

            ${{ steps.release-meta.outputs.prerelease != 'true' && '---' || '' }}

            ### Installation
            Install this specific version with checksum verification:

            **macOS/Linux:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.release-meta.outputs.tag_name }}/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/download/${{ steps.release-meta.outputs.tag_name }}/install.ps1 | iex
            ```

            ### Downloads
            - **Linux (x64)**: `git-ai-linux-x64`
            - **Linux (ARM64)**: `git-ai-linux-arm64`
            - **Linux deb (amd64)**: `git-ai_*_amd64.deb`
            - **Linux deb (arm64)**: `git-ai_*_arm64.deb`
            - **Linux rpm (x86_64)**: `git-ai-*-1.x86_64.rpm`
            - **Linux rpm (aarch64)**: `git-ai-*-1.aarch64.rpm`
            - **Windows (x64)**: `git-ai-windows-x64.exe`
            - **Windows (ARM64)**: `git-ai-windows-arm64.exe`
            - **Windows MSI (x64)**: `git-ai-windows-x64.msi`
            - **Windows MSI (ARM64)**: `git-ai-windows-arm64.msi`
            - **macOS (Intel)**: `git-ai-macos-x64`
            - **macOS (Apple Silicon)**: `git-ai-macos-arm64`
            - **macOS pkg (Intel)**: `git-ai-macos-x64.pkg`
            - **macOS pkg (Apple Silicon)**: `git-ai-macos-arm64.pkg`

            ### SHA256 Checksums
            ```
            $(cat release/SHA256SUMS)
            ```

            ### Attestation Verification
            Verify build provenance with the GitHub CLI:
            ```bash
            gh attestation verify git-ai-<platform> --repo ${{ github.repository }}
            ```
          files: |
            release/git-ai-*
            release/git-ai_*
            release/SHA256SUMS
            release/install.sh
            release/install.ps1
          draft: false
          prerelease: ${{ steps.release-meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.release-meta.outputs.make_latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release bot token
        if: inputs.release_production == true
        id: release-bot-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: 3481373
          private-key: ${{ secrets.GIT_AI_INTERNAL_RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout code for version bump
        if: inputs.release_production == true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.release-bot-token.outputs.token }}
          fetch-depth: 0

      - name: Install Rust toolchain
        if: inputs.release_production == true
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # master
        with:
          toolchain: stable

      - name: Bump version in Cargo.toml
        if: inputs.release_production == true
        id: bump-version
        run: |
          # Extract current version
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | cut -d'"' -f2)
          echo "Current version: $CURRENT_VERSION"
          
          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Bump patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: $NEW_VERSION"
          
          # Update Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak
          
          # Update flake.nix version to match
          sed -i.bak "s/version = \".*\"/version = \"${NEW_VERSION}\"/" flake.nix
          rm flake.nix.bak
          
          # Update Cargo.lock
          cargo check
          
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        if: inputs.release_production == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock flake.nix
          git commit -m "chore: bump version to ${{ steps.bump-version.outputs.new_version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Trigger release channel update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.RELEASE_CHANNEL_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/next-element-inc/monorepo/actions/workflows/update-release-version.yaml/dispatches \
            -d '{
              "ref": "dev",
              "inputs": {
                "channel": "${{ steps.release-meta.outputs.channel_label }}",
                "tag": "${{ steps.release-meta.outputs.tag_name }}"
              }
            }'
